<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Sync to GitHub</title>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 50px; background: #f4f6f8; color: #333; }
        .box { background: white; padding: 40px 30px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); max-width: 450px; width: 100%; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.6rem; }
        p { color: #666; font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
        button { background: #3498db; color: white; border: none; padding: 14px 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; width: 100%; }
        button:hover { background: #2980b9; }
        #status { margin-top: 20px; font-size: 0.9rem; font-weight: 500; padding: 10px; border-radius: 6px; display: none; }
        .success { background: #e8f8f5; color: #27ae60; border: 1px solid #27ae60; display: block !important; }
        .error { background: #fce4d6; color: #c0392b; border: 1px solid #c0392b; display: block !important; }
        .loading { background: #ebf5fb; color: #2980b9; border: 1px solid #3498db; display: block !important; }
    </style>
</head>
<body>

<div class="box">
    <h2>📬 Gmail Sync to GitHub JSON</h2>
    <p>Masukkan GitHub Personal Access Token (Classic) kamu yang baru di bawah ini terlebih dahulu agar aman:</p>
    
    <input type="password" id="gh_token" placeholder="Masukkan ghp_... disini" />
    
    <button id="login_btn" onclick="handleAuthClick()">Login & Sync Sekarang</button>
    
    <div id="status"></div>
</div>

<script>
    const GOOGLE_CLIENT_ID = '145516203410-l9nlnbecsobvkg27vq5k344o4squnpnt.apps.googleusercontent.com';
    const GITHUB_REPO_OWNER = 'tukangketik00';
    const GITHUB_REPO_NAME = 'gmapi';

    let tokenClient;

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/gmail.readonly',
            callback: async (response) => {
                if (response.access_token) {
                    showStatus("Meminta Robot GitHub Actions bekerja...", "loading");
                    await triggerGitHubAction(response.access_token);
                } else {
                    showStatus("Gagal mendapatkan izin akses dari Google.", "error");
                }
            }
        });
    }

    function handleAuthClick() {
        const tokenInput = document.getElementById('gh_token').value.trim();
        if (!tokenInput) {
            alert("Harap masukkan GitHub Token kamu terlebih dahulu di kotak yang disediakan!");
            return;
        }
        tokenClient.requestAccessToken({prompt: 'consent'});
    }

    async function triggerGitHubAction(googleToken) {
        const userGithubToken = document.getElementById('gh_token').value.trim();
        const url = `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/dispatches`;
        
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${userGithubToken}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event_type: 'sync_gmail',
                    client_payload: { token: googleToken }
                })
            });

            if (res.status === 204) {
                showStatus("✅ Sukses! Robot GitHub Actions sedang berjalan.<br><br>Tunggu 1 menit, lalu file JSON kamu akan ter-update.", "success");
            } else {
                showStatus("❌ Gagal. Pastikan Token GitHub yang kamu masukkan benar. Code: " + res.status, "error");
            }
        } catch (err) {
            showStatus("Error koneksi: " + err.message, "error");
        }
    }

    function showStatus(text, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = text;
        statusDiv.className = type;
    }

    window.onload = initClient;
</script>
</body>
</html>
